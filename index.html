<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de QR Code Profissional com Logo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen flex flex-col justify-between font-sans">

    <header class="bg-white border-b border-slate-200 py-4 px-6 shadow-sm">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                <i class="fa-solid fa-qrcode text-blue-600"></i>
                QR Generator<span class="text-blue-600">Pro</span>
            </h1>
            <span class="text-xs bg-blue-50 text-blue-600 font-semibold px-2.5 py-1 rounded-full">100% Gratuito</span>
        </div>
    </header>

    <main class="max-w-5xl w-full mx-auto p-6 my-auto">
        <div class="grid md:grid-cols-2 gap-8 bg-white p-8 rounded-2xl shadow-sm border border-slate-100">
            
            <div class="flex flex-col justify-between space-y-6">
                <div>
                    <h2 class="text-2xl font-bold text-slate-800 mb-2">Criar QR Code com Logo</h2>
                    <p class="text-slate-500 text-sm">Escolha a categoria desejada. A logo correspondente será embutida no centro automaticamente.</p>
                </div>

                <div class="flex flex-wrap gap-2 border-b border-slate-100 pb-4" id="tabs">
                    <button type="button" id="tab-link" class="tab-btn px-3 py-2 text-xs font-semibold rounded-xl flex items-center gap-1.5 transition-all bg-blue-600 text-white shadow-sm">
                        <i class="fa-solid fa-link"></i> Link
                    </button>
                    <button type="button" id="tab-whatsapp" class="tab-btn px-3 py-2 text-xs font-semibold rounded-xl flex items-center gap-1.5 transition-all bg-slate-100 text-slate-600 hover:bg-slate-200">
                        <i class="fa-brands fa-whatsapp text-base"></i> WhatsApp
                    </button>
                    <button type="button" id="tab-instagram" class="tab-btn px-3 py-2 text-xs font-semibold rounded-xl flex items-center gap-1.5 transition-all bg-slate-100 text-slate-600 hover:bg-slate-200">
                        <i class="fa-brands fa-instagram text-base"></i> Instagram
                    </button>
                    <button type="button" id="tab-facebook" class="tab-btn px-3 py-2 text-xs font-semibold rounded-xl flex items-center gap-1.5 transition-all bg-slate-100 text-slate-600 hover:bg-slate-200">
                        <i class="fa-brands fa-facebook text-base"></i> Facebook
                    </button>
                    <button type="button" id="tab-youtube" class="tab-btn px-3 py-2 text-xs font-semibold rounded-xl flex items-center gap-1.5 transition-all bg-slate-100 text-slate-600 hover:bg-slate-200">
                        <i class="fa-brands fa-youtube text-base"></i> YouTube
                    </button>
                    <button type="button" id="tab-tiktok" class="tab-btn px-3 py-2 text-xs font-semibold rounded-xl flex items-center gap-1.5 transition-all bg-slate-100 text-slate-600 hover:bg-slate-200">
                        <i class="fa-brands fa-tiktok text-base"></i> TikTok
                    </button>
                    <button type="button" id="tab-wifi" class="tab-btn px-3 py-2 text-xs font-semibold rounded-xl flex items-center gap-1.5 transition-all bg-slate-100 text-slate-600 hover:bg-slate-200">
                        <i class="fa-solid fa-wifi"></i> Wi-Fi
                    </button>
                    <button type="button" id="tab-pix" class="tab-btn px-3 py-2 text-xs font-semibold rounded-xl flex items-center gap-1.5 transition-all bg-slate-100 text-slate-600 hover:bg-slate-200">
                        <i class="fa-solid fa-money-bill-transfer"></i> Pix
                    </button>
                    <button type="button" id="tab-email" class="tab-btn px-3 py-2 text-xs font-semibold rounded-xl flex items-center gap-1.5 transition-all bg-slate-100 text-slate-600 hover:bg-slate-200">
                        <i class="fa-solid fa-envelope"></i> E-mail
                    </button>
                    <button type="button" id="tab-vcard" class="tab-btn px-3 py-2 text-xs font-semibold rounded-xl flex items-center gap-1.5 transition-all bg-slate-100 text-slate-600 hover:bg-slate-200">
                        <i class="fa-solid fa-address-card"></i> vCard
                    </button>
                </div>

                <div class="space-y-4">
                    
                    <div id="form-link" class="qr-form space-y-4">
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-2">URL ou Texto</label>
                            <input type="text" id="input-link" placeholder="https://exemplo.com" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                        </div>
                    </div>

                    <div id="form-whatsapp" class="qr-form hidden space-y-4">
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-2">Número do WhatsApp (com DDD)</label>
                            <input type="tel" id="input-wa-phone" placeholder="Ex: 11999999999" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-emerald-500 transition-all">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-2">Mensagem Pronta (Opcional)</label>
                            <textarea id="input-wa-message" placeholder="Olá!" rows="2" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-emerald-500 transition-all"></textarea>
                        </div>
                    </div>

                    <div id="form-instagram" class="qr-form hidden space-y-4">
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-2">Nome de Usuário (@)</label>
                            <div class="relative">
                                <span class="absolute left-4 top-3 text-slate-400 font-medium">@</span>
                                <input type="text" id="input-ig-user" placeholder="seu.perfil" class="w-full pl-9 pr-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-pink-500 transition-all">
                            </div>
                        </div>
                    </div>

                    <div id="form-facebook" class="qr-form hidden space-y-4">
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-2">Link do Perfil ou Página</label>
                            <input type="text" id="input-fb-url" placeholder="https://facebook.com/seu.perfil" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-700 transition-all">
                        </div>
                    </div>

                    <div id="form-youtube" class="qr-form hidden space-y-4">
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-2">Link do Canal ou do Vídeo</label>
                            <input type="text" id="input-yt-url" placeholder="https://youtube.com/@seu-canal" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-red-600 transition-all">
                        </div>
                    </div>

                    <div id="form-tiktok" class="qr-form hidden space-y-4">
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-2">Nome de Usuário do TikTok</label>
                            <div class="relative">
                                <span class="absolute left-4 top-3 text-slate-400 font-medium">@</span>
                                <input type="text" id="input-tt-user" placeholder="seu.usuario" class="w-full pl-9 pr-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-neutral-900 transition-all">
                            </div>
                        </div>
                    </div>

                    <div id="form-wifi" class="qr-form hidden space-y-4">
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-2">Nome da Rede (SSID)</label>
                            <input type="text" id="input-wifi-ssid" placeholder="MinhaRedeWifi" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-amber-500 transition-all">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-2">Senha</label>
                            <input type="password" id="input-wifi-pass" placeholder="********" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-amber-500 transition-all">
                        </div>
                    </div>

                    <div id="form-pix" class="qr-form hidden space-y-4">
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1">Chave Pix</label>
                            <input type="text" id="input-pix-key" placeholder="CPF, E-mail, Celular ou Chave Aleatória" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-teal-500 transition-all">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-1">Nome Recebedor</label>
                                <input type="text" id="input-pix-name" placeholder="Ex: Fulano de Tal" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-teal-500 transition-all">
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-1">Cidade</label>
                                <input type="text" id="input-pix-city" placeholder="Ex: Sao Paulo" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-teal-500 transition-all">
                            </div>
                        </div>
                    </div>

                    <div id="form-email" class="qr-form hidden space-y-4">
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-2">E-mail de Destino</label>
                            <input type="email" id="input-mail-to" placeholder="contato@empresa.com" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                        </div>
                    </div>

                    <div id="form-vcard" class="qr-form hidden space-y-4">
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1">Nome Completo</label>
                            <input type="text" id="input-vc-name" placeholder="Ex: João Silva" class="w-full px-4 py-2 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-cyan-500 transition-all">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-1">Telefone Celular</label>
                                <input type="tel" id="input-vc-phone" placeholder="Ex: 11999999999" class="w-full px-4 py-2 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-cyan-500 transition-all">
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-1">E-mail</label>
                                <input type="email" id="input-vc-email" placeholder="joao@link.com" class="w-full px-4 py-2 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-cyan-500 transition-all">
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4 pt-2">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Cor do QR Code</label>
                            <input type="color" id="qr-color" value="#1e293b" class="w-full h-10 rounded-lg cursor-pointer border border-slate-200">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Cor de Fundo</label>
                            <input type="color" id="bg-color" value="#ffffff" class="w-full h-10 rounded-lg cursor-pointer border border-slate-200">
                        </div>
                    </div>
                </div>

                <button type="button" id="generate-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-xl transition-all shadow-md shadow-blue-100 flex justify-center items-center gap-2">
                    Gerar QR Code Profissional
                </button>
            </div>

            <div class="flex flex-col items-center justify-center border-t md:border-t-0 md:border-l border-slate-100 pt-8 md:pt-0 md:pl-8">
                <div class="bg-slate-50 p-6 rounded-2xl border border-slate-150 inline-block">
                    <div id="qrcode" class="bg-white p-2 rounded-xl shadow-inner flex items-center justify-center min-h-[220px] min-w-[220px]">
                        <p id="placeholder-text" class="text-slate-400 text-sm text-center">O seu QR Code<br>com logo aparecerá aqui</p>
                    </div>
                </div>

                <button type="button" id="download-btn" class="hidden mt-6 bg-slate-800 hover:bg-slate-900 text-white font-semibold py-2.5 px-6 rounded-xl transition-all flex items-center gap-2 text-sm">
                    <i class="fa-solid fa-download"></i> Salvar Imagem PNG
                </button>
            </div>

        </div>
    </main>

    <footer class="py-6 border-t border-slate-100 bg-white">
        <div class="max-w-5xl mx-auto px-6 text-center text-sm text-slate-400">
            &copy; 2026 QR Generator Pro. Processamento local avançado via Engine QR-Code-Styling.
        </div>
    </footer>

    <script src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            
            let currentTab = 'link';
            let qrCodeStylingInstance = null;

            // Cores oficiais e links das logos em SVG/PNG limpos de alta resolução
            const tabConfig = {
                link: { bg: 'bg-blue-600', text: 'text-white', logo: 'https://cdn-icons-png.flaticon.com/512/1006/1006771.png' },
                whatsapp: { bg: 'bg-emerald-600', text: 'text-white', logo: 'https://cdn-icons-png.flaticon.com/512/3670/3670051.png' },
                instagram: { bg: 'bg-gradient-to-r from-purple-600 via-pink-600 to-orange-500', text: 'text-white', logo: 'https://cdn-icons-png.flaticon.com/512/3955/3955024.png' },
                facebook: { bg: 'bg-blue-700', text: 'text-white', logo: 'https://cdn-icons-png.flaticon.com/512/174/174848.png' },
                youtube: { bg: 'bg-red-600', text: 'text-white', logo: 'https://cdn-icons-png.flaticon.com/512/1384/1384060.png' },
                tiktok: { bg: 'bg-neutral-900', text: 'text-white', logo: 'https://cdn-icons-png.flaticon.com/512/3046/3046121.png' },
                wifi: { bg: 'bg-amber-500', text: 'text-white', logo: 'https://cdn-icons-png.flaticon.com/512/9036/9036109.png' },
                pix: { bg: 'bg-teal-600', text: 'text-white', logo: 'https://cdn-icons-png.flaticon.com/512/11104/11104234.png' },
                email: { bg: 'bg-indigo-600', text: 'text-white', logo: 'https://cdn-icons-png.flaticon.com/512/542/542689.png' },
                vcard: { bg: 'bg-cyan-600', text: 'text-white', logo: 'https://cdn-icons-png.flaticon.com/512/3067/3067258.png' }
            };

            function switchTab(tabName) {
                currentTab = tabName;
                document.querySelectorAll('.qr-form').forEach(form => form.classList.add('hidden'));
                document.querySelectorAll('.tab-btn').forEach(btn => {
                    btn.className = "tab-btn px-3 py-2 text-xs font-semibold rounded-xl flex items-center gap-1.5 transition-all bg-slate-100 text-slate-600 hover:bg-slate-200";
                });

                const targetForm = document.getElementById(`form-${tabName}`);
                if (targetForm) targetForm.classList.remove('hidden');
                
                const activeBtn = document.getElementById(`tab-${tabName}`);
                if (activeBtn && tabConfig[tabName]) {
                    activeBtn.classList.remove('bg-slate-100', 'text-slate-600', 'hover:bg-slate-200');
                    tabConfig[tabName].bg.split(' ').forEach(cls => activeBtn.classList.add(cls));
                    activeBtn.classList.add(tabConfig[tabName].text, 'shadow-sm');
                }
            }

            document.querySelectorAll('.tab-btn').forEach(button => {
                button.addEventListener('click', (e) => {
                    switchTab(e.currentTarget.id.replace('tab-', ''));
                });
            });

            const qrColorInput = document.getElementById('qr-color');
            const bgColorInput = document.getElementById('bg-color');
            const generateBtn = document.getElementById('generate-btn');
            const qrcodeContainer = document.getElementById('qrcode');
            const placeholderText = document.getElementById('placeholder-text');
            const downloadBtn = document.getElementById('download-btn');

            function crc16ccitt(str) {
                let crc = 0xFFFF;
                for (let c = 0; c < str.length; c++) {
                    crc ^= str.charCodeAt(c) << 8;
                    for (let i = 0; i < 8; i++) {
                        if (crc & 0x8000) crc = (crc << 1) ^ 0x1021;
                        else crc = crc << 1;
                    }
                }
                return (crc & 0xFFFF).toString(16).toUpperCase().padStart(4, '0');
            }

            function cleanTextPix(text) {
                return text.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase();
            }

            function getPayload() {
                if (currentTab === 'link') return document.getElementById('input-link').value.trim() || null;
                if (currentTab === 'whatsapp') {
                    let phone = document.getElementById('input-wa-phone').value.replace(/\D/g, '');
                    const msg = encodeURIComponent(document.getElementById('input-wa-message').value.trim());
                    return phone ? `https://wa.me/${phone}${msg ? '?text=' + msg : ''}` : null;
                } 
                if (currentTab === 'instagram') {
                    const user = document.getElementById('input-ig-user').value.trim().replace('@', '');
                    return user ? `https://instagram.com/${user}` : null;
                }
                if (currentTab === 'facebook') return document.getElementById('input-fb-url').value.trim() || null;
                if (currentTab === 'youtube') return document.getElementById('input-yt-url').value.trim() || null;
                if (currentTab === 'tiktok') {
                    const user = document.getElementById('input-tt-user').value.trim().replace('@', '');
                    return user ? `https://tiktok.com/@${user}` : null;
                }
                if (currentTab === 'wifi') {
                    const ssid = document.getElementById('input-wifi-ssid').value.trim();
                    const pass = document.getElementById('input-wifi-pass').value.trim();
                    return ssid ? `WIFI:S:${ssid};T:WPA;P:${pass};;` : null;
                }
                if (currentTab === 'pix') {
                    const key = document.getElementById('input-pix-key').value.trim();
                    let name = cleanTextPix(document.getElementById('input-pix-name').value.trim());
                    let city = cleanTextPix(document.getElementById('input-pix-city').value.trim());
                    if (!key || !name || !city) return null;
                    name = name.substring(0, 25); city = city.substring(0, 15);
                    let pix = "00020126" + `${(18 + key.length).toString().padStart(2, '0')}0014br.gov.bcb.pix01${key.length.toString().padStart(2, '0')}${key}` + "5204000053039865802BR" + `59${name.length.toString().padStart(2, '0')}${name}60${city.length.toString().padStart(2, '0')}${city}62070503***6304";
                    return pix + crc16ccitt(pix);
                }
                if (currentTab === 'email') {
                    const to = document.getElementById('input-mail-to').value.trim();
                    return to ? `mailto:${to}` : null;
                }
                if (currentTab === 'vcard') {
                    const name = document.getElementById('input-vc-name').value.trim();
                    const phone = document.getElementById('input-vc-phone').value.trim();
                    const email = document.getElementById('input-vc-email').value.trim();
                    if (!name) return null;
                    return `BEGIN:VCARD\nVERSION:3.0\nN:${name}\nFN:${name}\nTEL;TYPE=CELL:${phone}\nEMAIL:${email}\nEND:VCARD`;
                }
                return null;
            }

            generateBtn.addEventListener('click', () => {
                if (typeof QRCodeStyling === 'undefined') {
                    alert('Aguarde o carregamento do motor gráfico do site.');
                    return;
                }

                const payload = getPayload();
                if (!payload) {
                    alert('Por favor, preencha as informações obrigatórias!');
                    return;
                }

                qrcodeContainer.innerHTML = '';
                placeholderText.style.display = 'none';

                // Configuração avançada com a injeção nativa de imagem (logo centralizada)
                qrCodeStylingInstance = new QRCodeStyling({
                    width: 220,
                    height: 220,
                    type: "canvas",
                    data: payload,
                    image: tabConfig[currentTab].logo,
                    dotsOptions: {
                        color: qrColorInput.value,
                        type: "extra-rounded" // Deixa o QR Code com aparência moderna arredondada
                    },
                    backgroundOptions: {
                        color: bgColorInput.value,
                    },
                    imageOptions: {
                        crossOrigin: "anonymous",
                        hideBackgroundDots: true, // Remove os pontos pretos atrás da logo automaticamente
                        imageSize: 0.4, // Tamanho ideal da logo para não atrapalhar a leitura da câmera
                        margin: 4
                    },
                    cornersSquareOptions: {
                        type: "extra-rounded"
                    }
                });

                qrCodeStylingInstance.append(qrcodeContainer);
                downloadBtn.classList.remove('hidden');
            });

            downloadBtn.addEventListener('click', () => {
                if (qrCodeStylingInstance) {
                    qrCodeStylingInstance.download({ name: `qrcode_${currentTab}`, extension: "png" });
                }
            });
        });
    </script>
</body>
</html>
